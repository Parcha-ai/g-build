<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for the background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <!-- Gradient for the C letter -->
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ee5a24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d63031;stop-opacity:1" />
    </linearGradient>
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- Decorative ring -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.1"/>
  <circle cx="512" cy="512" r="340" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.05"/>

  <!-- The C letter - stylized -->
  <g filter="url(#shadow)">
    <path d="M 620 320
             C 520 280, 380 300, 320 400
             C 260 500, 260 600, 320 700
             C 380 800, 520 820, 620 780
             L 580 700
             C 520 730, 420 720, 380 660
             C 340 600, 340 500, 380 440
             C 420 380, 520 370, 580 400
             Z"
          fill="url(#cGrad)"
          filter="url(#glow)"/>
  </g>

  <!-- Accent dot -->
  <circle cx="680" cy="380" r="45" fill="#4ecdc4" filter="url(#glow)"/>

  <!-- Small sparkle accents -->
  <circle cx="750" cy="280" r="8" fill="#fff" opacity="0.6"/>
  <circle cx="280" cy="750" r="6" fill="#fff" opacity="0.4"/>
  <circle cx="320" cy="300" r="5" fill="#fff" opacity="0.3"/>
</svg>
